<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Home – Online Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <nav>
    <a class="brand" href="home_admin.html">📚 Online Library</a>
    <div id="main-nav"></div>
  </nav>
</header>

<div class="page-title">
  <h1>Admin Dashboard</h1>
  <p>Manage the library collection and system settings</p>
</div>

<main>
  <!-- Search -->
  <div class="search-bar">
    <input type="search" id="search-input" placeholder="Search by title, author or category…" oninput="renderBooks()" />
    <select id="filter-category" onchange="renderBooks()">
      <option value="">All Categories</option>
    </select>
    <select id="filter-status" onchange="renderBooks()">
      <option value="">All Statuses</option>
      <option value="true">Available</option>
      <option value="false">Borrowed</option>
    </select>
  </div>

  <div class="toolbar">
    <div class="section-label">Library Collection</div>
    <a href="add_book.html" class="btn btn-primary btn-sm">+ Add New Book</a>
  </div>

  <div id="book-grid" class="book-grid"></div>
</main>

<footer>© 2026 Online Library System</footer>

<script src="nav.js"></script>
<script>
  requireAuth(true);
  seedBooksIfEmpty();

  function populateCategories() {
    const books = getBooks();
    const cats  = [...new Set(books.map(b => b.category))].sort();
    const sel   = document.getElementById('filter-category');
    cats.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
  }

  function renderBooks() {
    const query  = document.getElementById('search-input').value.toLowerCase();
    const cat    = document.getElementById('filter-category').value;
    const status = document.getElementById('filter-status').value;

    let books = getBooks().filter(b => {
      const matchQuery = b.name.toLowerCase().includes(query) ||
                         b.author.toLowerCase().includes(query) ||
                         b.category.toLowerCase().includes(query);
      const matchCat   = !cat    || b.category === cat;
      const matchStatus= status === '' || String(b.available) === status;
      return matchQuery && matchCat && matchStatus;
    });

    const grid = document.getElementById('book-grid');
    grid.innerHTML = '';

    if (books.length === 0) {
      grid.innerHTML = '<p style="color:var(--grey);">No books found.</p>';
      return;
    }

    books.forEach(book => {
      const card = document.createElement('div');
      card.className = 'book-card';
      card.innerHTML = `
        <h3>${esc(book.name)}</h3>
        <p class="author">${esc(book.author)}</p>
        <small class="category">${esc(book.category)}</small>
        <span class="state ${book.available ? 'available' : 'borrowed'}">
          ${book.available ? 'Available' : 'Borrowed'}
        </span>
        <div class="card-actions">
          <a href="edit_book.html?id=${book.id}" class="btn btn-secondary btn-sm">Edit</a>
          <button class="btn btn-danger btn-sm" onclick="deleteBook(${book.id})">Delete</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function deleteBook(id) {
    if (!confirm('Are you sure you want to delete this book? This action cannot be undone.')) return;
    let books = getBooks().filter(b => b.id !== id);
    saveBooks(books);
    renderBooks();
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  populateCategories();
  renderBooks();
</script>

</body>
</html>
